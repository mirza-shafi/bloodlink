# BloodLink Application Configuration

# Application
spring.application.name=BloodLink
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bloodlink}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=BloodLinkSecretKey2024ForJwtTokenGenerationBloodLink
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.bloodlink=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Admin Configuration
admin.email=${ADMIN_EMAIL:admin@bloodlink.com}
admin.password=${ADMIN_PASSWORD:password}

