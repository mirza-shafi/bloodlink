services:
  db:
    image: mysql:8.0
    container_name: bloodlink-db
    restart: always
    environment:
      MYSQL_DATABASE: bloodlink
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    pull_policy: never
    container_name: backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=bloodlink
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - ADMIN_EMAIL=admin@bloodlink.com
      - ADMIN_PASSWORD=password
    depends_on:

      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: bloodlink-client
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

volumes:
  mysql_data:

